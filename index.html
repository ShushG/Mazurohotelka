<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Счетчик и Доска объявлений</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            background-color: #1e1e24;
            color: #fff;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        #number {
            font-size: 64px;
            font-weight: bold;
            color: #ff4757;
            margin-bottom: 30px;
        }
        .board {
            background-color: #2f3542;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }
        .field-title {
            font-size: 14px;
            color: #a4b0be;
            text-align: left;
            margin: 10px 0 5px 5px;
        }
        .display-text {
            background-color: #747d8c;
            padding: 12px;
            border-radius: 8px;
            min-height: 25px;
            text-align: left;
            word-wrap: break-word;
            font-size: 18px;
            font-weight: 500;
        }
        .inputs {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #747d8c;
            background-color: #2f3542;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            border-color: #ff4757;
            outline: none;
        }
        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover {
            background-color: #ff6b81;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Вертикальный счетчик дней -->
        <h1>Прошло дней:</h1>
        <div id="number">0</div>

        <!-- Доска, где отображается текущий сохраненный текст -->
        <div class="board">
            <div class="field-title">Главное поле 1:</div>
            <div id="boardField1" class="display-text">Загрузка...</div>

            <div class="field-title">Главное поле 2:</div>
            <div id="boardField2" class="display-text">Загрузка...</div>
        </div>

        <!-- Поля для ввода нового текста и кнопка отправки -->
        <div class="inputs">
            <input type="text" id="inputField1" placeholder="Введите новый текст для поля 1">
            <input type="text" id="inputField2" placeholder="Введите новый текст для поля 2">
            <button id="throwBtn">Throw</button>
        </div>
    </div>

    <!-- Подключаем Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Твой личный конфиг от Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBNkL4I3cWYp3EvOBCPnaXKbF471rxc6ak",
            authDomain: "my-shared-board-c2a23.firebaseapp.com",
            databaseURL: "https://my-shared-board-c2a23-default-rtdb.firebaseio.com",
            projectId: "my-shared-board-c2a23",
            storageBucket: "my-shared-board-c2a23.firebasestorage.app",
            messagingSenderId: "732470786274",
            appId: "1:732470786274:web:574d3ead94a3635d4fc6bb",
            measurementId: "G-R8PCB2M39F"
        };

        // Инициализируем Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // --- ЛОГИКА СЧЕТЧИКА ДНЕЙ ---
        // Точка отсчета: 5 апреля 2025 года (16 мая 2026 минус 406 дней)
        // В JS месяцы считаются с 0, поэтому апрель — это 3
        const startDate = new Date(2025, 3, 5); 
        const currentDate = new Date();
        const differenceInTime = currentDate.getTime() - startDate.getTime();
        const differenceInDays = Math.floor(differenceInTime / (1000 * 3600 * 24));
        document.getElementById('number').innerText = differenceInDays >= 0 ? differenceInDays : 0;

        // --- ЛОГИКА ЖИВОЙ ДОСКИ (FIREBASE) ---
        const boardRef = ref(database, 'sharedBoard');

        // Слушаем изменения в базе данных в реальном времени
        onValue(boardRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('boardField1').innerText = data.text1 || 'Пусто';
                document.getElementById('boardField2').innerText = data.text2 || 'Пусто';
            } else {
                document.getElementById('boardField1').innerText = 'Пусто';
                document.getElementById('boardField2').innerText = 'Пусто';
            }
        });

        // Клик по кнопке Throw — отправка данных в базу
        document.getElementById('throwBtn').addEventListener('click', () => {
            const t1 = document.getElementById('inputField1').value;
            const t2 = document.getElementById('inputField2').value;

            // Сохраняем в Firebase
            set(boardRef, {
                text1: t1,
                text2: t2
            }).then(() => {
                // Очищаем поля ввода после успешной отправки
                document.getElementById('inputField1').value = '';
                document.getElementById('inputField2').value = '';
            }).catch((error) => {
                alert("Ошибка сохранения: " + error.message);
            });
        });
    </script>
</body>
</html>
