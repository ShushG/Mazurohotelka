<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mazurohotelka</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            background-color: #1e1e24;
            color: #fff;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .gradient-title {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #ff9f43, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #number {
            font-size: 72px;
            font-weight: bold;
            margin-bottom: 5px;
            background: linear-gradient(to bottom, #FFD700, #B8860B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Фіолетовий градієнт для тексту */
        .eternal-text {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(to left, #4b0082, #e0b0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Блакитний градієнт для вогника */
        .fire-icon {
            font-size: 50px;
            margin-bottom: 25px;
            background: linear-gradient(to bottom, #00d2ff, #005f73);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .board {
            background-color: #2f3542;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }
        .field-title {
            font-size: 16px;
            color: #ff9f43;
            text-align: left;
            margin: 10px 0 5px 5px;
            font-weight: bold;
        }
        .display-text {
            background-color: #747d8c;
            padding: 12px;
            border-radius: 8px;
            min-height: 25px;
            text-align: left;
            word-wrap: break-word;
            font-size: 18px;
            font-weight: 500;
        }
        .inputs {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #747d8c;
            background-color: #2f3542;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background: linear-gradient(to bottom, #ff4757, #8b0000);
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s;
            text-transform: uppercase;
        }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="gradient-title">Mazurohotelka</h1>
        
        <h3>Прошло дней:</h3>
        <div id="number">0</div>
        
        <!-- Нові елементи -->
        <div class="eternal-text">"Хащацький вічний"</div>
        <div class="fire-icon">🔥</div>

        <div class="board">
            <div class="field-title">M</div>
            <div id="boardField1" class="display-text">Загрузка...</div>

            <div class="field-title">S</div>
            <div id="boardField2" class="display-text">Загрузка...</div>
        </div>

        <div class="inputs">
            <input type="text" id="inputField1" placeholder="Введите здесь если вы M">
            <input type="text" id="inputField2" placeholder="Введите здесь если вы S">
            <button id="throwBtn">Throw</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBNkL4I3cWYp3EvOBCPnaXKbF471rxc6ak",
            authDomain: "my-shared-board-c2a23.firebaseapp.com",
            databaseURL: "https://my-shared-board-c2a23-default-rtdb.firebaseio.com",
            projectId: "my-shared-board-c2a23",
            storageBucket: "my-shared-board-c2a23.firebasestorage.app",
            messagingSenderId: "732470786274",
            appId: "1:732470786274:web:574d3ead94a3635d4fc6bb",
            measurementId: "G-R8PCB2M39F"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const boardRef = ref(database, 'sharedBoard');

        const startDate = new Date(2025, 3, 5);
        const differenceInDays = Math.floor((new Date() - startDate) / (1000 * 3600 * 24));
        document.getElementById('number').innerText = differenceInDays >= 0 ? differenceInDays : 0;

        onValue(boardRef, (snapshot) => {
            const data = snapshot.val() || {};
            document.getElementById('boardField1').innerText = data.text1 || '...';
            document.getElementById('boardField2').innerText = data.text2 || '...';
        });

        document.getElementById('throwBtn').addEventListener('click', async () => {
            const val1 = document.getElementById('inputField1').value.trim();
            const val2 = document.getElementById('inputField2').value.trim();
            const snapshot = await get(boardRef);
            const currentData = snapshot.val() || {};

            const updateData = {
                text1: val1 !== "" ? val1 : (currentData.text1 || ""),
                text2: val2 !== "" ? val2 : (currentData.text2 || "")
            };

            await set(boardRef, updateData);
            document.getElementById('inputField1').value = '';
            document.getElementById('inputField2').value = '';
        });
    </script>
</body>
</html>
